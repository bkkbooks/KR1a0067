body:
  text: 易圖通變卷二宋雷思齊撰河圖𫝊中天地之理未始不有數行乎其中然或有餘於數不足於數唯其餘不足而為之中制故雖隂陽竒耦之數有分有合有虚有實有進有退有自然互相生成之中道焉一隂一陽之謂道者隂陽分一以為天地上下合一以為乾坤天地上下分為四方而中无以合乾坤隂陽合為四時而中有可分是同一道也天地以形言則南北為經上天下地而水火木金之為形者既可以圖而分故曰法象莫大乎天地廣大配天地也隂陽以氣論則東西為緯乾陽坤隂而冬夏春秋之為氣者亦可以理而合故曰變通莫大乎四時變通配四時也於斯二者无以異也四方有中中无定體而四象八卦以之立四時有五五无定著而四時八節以之行孔子著大𫝊不存河圖而特存天地之數者示其有得於數則圖在其中矣圖之數生以天一者成以地六生以地二者成以天七生以天三者成以地八生以地四者成以天九至謂天五地十之生成則何自而求哉案圖索駿也故制五於八卦之虗中猶可容其數而制十於其中則无所容其數矣是知數之有生有成而不知其所以生且成者徒得其貌而无以得古聖人之所以為天地立心為生民立極者千載可為之長太息則古猶今也夫竒數皆天耦數皆地生以天者成以地生以地者成以天其為天若地特隂陽之進退出入竒耦之體用分合而已說卦曰參天兩地而倚數觀變於隂陽而立卦𤼵揮於剛柔而生爻大𫝊曰參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變孰能與於此其曲盡乎至妙之用者河圖法也數始於一而中於五而終於十中於五者分其四之偏終於十者合其八之正葢一之始其全體无餘不足不可得而用而獨得於中既以其一寄生於五遂以其一寄成於十以終之故四象有五八卦有十皆有數而无所定其位以五生其偏以十成其正而所謂一者遂莫知所尋獨見於五見於十之為中者以止齊焉耳故嘗求其所以然而莫之得適記兒時於牧豎閒見所謂八格戱者其局不過中加十十之文而已時極厭薄之以為至鄙至賤未嘗加之意也不謂年踰七十乃知其然所謂百姓日用而不知終身由之而不知其道者古之人豈欺我哉葢今之即古之今之五即古文之十今之十猶古文之十而畫為十十於中此十五之法由之以有所見矣况又十下畫一則土文之為中者從可知已故云中土也其中直筆之丨即可見南北為經天尊地卑天地設位横筆之一則可見東西為緯分隂分陽隂陽成列從而十之則四維之偏各得其均四方之正亦隨以定其氣之互進互退交相生成率由五與十以立中道也故河圖之十五大衍之五十皆虚有其十與五之數以為之用而實无其位之體也欲知十五之道所以為中始於一而中於五而終於十者十即一也以十求一則其一於此固亦可以目存而心得於中矣因參稽自擬易以来其會十之為中為土者惟司馬氏潜虚似為得之然潜虚乃以著為基十著為冢而分列為五十五數以為名則是其中者已先實之矣非虚用也與河圖虚五寄十之理自不相入也河圖之數雖五十有五而其實體之數正只四十所餘十有五特虚以用於四十之中不過通為之數而實非有體位者也其曰參曰兩曰參伍者通其數之所變以用也參也者一二之所以變也由一自分其一以為二起自為之對則見其二而不見其一矣其一又自參出於二之中故三也於參之法是即為一小成是三畫之立見人參於天地之中以生也積三小成參其三而合於乾元用九是參之始制即陽竒之所謂天者所由然也兩也者由一生二起而對並以立既以象兩儀因之兩其二以象四象夫一本自一而二而參其一以為三况二本一之對豈不得三其二而反對之乎故從而三其二以成六即合於坤元用六是又兩之始制兼三才而兩之故六因之六畫成卦六位成章即隂耦之謂地者亦由以然也由是參其兩二而交十以合之是伍也兩其二伍則又什矣十特見於參九之外則又一之所由以寄者也何以明之參之兩之而伍而什之皆人文之為而自然與天地合者參文之厽彡兩文之从至維伍維什皆立人於維中維旁者斯可黙識古人立心立極之制有在於是矣必參其三三兩其三二是參兩之一小成矣故必又參其三三而參之為參天兩其三二而兩之為兩地是天地之數无從而合且分矣乃以其初不入於用之一數竒於十以行其中而為之分且合以成其中制者是一也而求於圖之數如環无端其一莫見何在而所見維十爾夫參其三三與兩其三二合而為大參兩斯有以見天地渾成一始終者所以然矣至所謂參伍錯綜則未究也其謂之參伍錯綜者五以前之數少於五无所用伍五以後之數多於五故參以五伍於其中錯且綜之而行其制中之法也然大𫝊於參伍以變錯綜其數亦必謂通其變然後能成天地之文極其數然後能定天下之象則知其未易知也然既教以參伍錯綜則安得不研求其所以然哉因參稽自繫易以来已幾二千年矣學者无探索及之者至於龍圖續始亦无𤼵眀深竊異之心潜力索極深研幾適然省悟元无它事也大𫝊曰天數五地數五五位相得而各有合即圖之數矣天一起於坎地六附於坤是一六之合綜之則七也參以天五錯伍於中並列而求之其首尾各一也故坎之一數為陽立極於北方之始而乾之六數為隂附於西北之維也天三出於震地八附於艮是三八之合綜之則十有一也參以天五錯伍於中並列而求之其首尾各三也故震之三數為陽立於東方之正而艮之八數為隂而附於東北之維也是二者先陽後隂地二分於西南為坤天七列於西為兊是二七之合綜之則九也參以天五錯伍於中並列而求之其首尾各二也坤之二數為隂先處於西南之維而兊之七數為陽始立於西方之正也地四偏於巽天九正於離是四九之合綜之而十有三也參以天五錯伍於中並列而求之其首尾各四也巽之四數為隂退守東南之維離之九數為陽正南面而立於極位也是二者先隂後陽由是知乾兊艮離之所以六七八九即坎震坤巽之一二三四也故陽得五而隂隂得五而陽耦得五而竒竒得五而耦乾之六乃一五而六也兊之七乃二五而七也艮之八乃三五而八也離之九乃四五而九也又由是知參伍以變參乾坎參艮震自北而東參兊坤參離巽自西而南參而分伍而合是謂參伍以變錯而分之見其參綜而合之見其伍是謂錯綜其數而錯綜者即參伍也散而錯之如一二三四之重分斂而綜之乃六七八九之復合也是謂五位相得而各有合豈嘗如後世别置五虚㸃於圖心而實謂天五哉故由是知河圖之數縱横順逆莫非自然而然不待人為牽合傅㑹以使然也其進數之升自北東極乎南退數之降自南西終極乎北皆陽數行而隂自隨之若隂數之進則自坤二而巽四退則自艮八而乾六然隂不過奉陽而已雖萬變亦一隂一陽而已爾是故伍坎一以為乾六於北伍坤二以為兊七於西伍震三以為艮八於東伍巽四以為離九於南則見制數之元自參伍矣於是又損震後之一以退益艮之全八而九三而三之始參之制也析震中前之二以合巽之全四分而六則兩之繼始也惟離之全數自得於九且當始終之中三而三之中參之制也兼坤之全二以貫兊中前之四合而六則兩之代終也絶兊後之三以補乾之全六三而三之終參之制也是則參天兩地之綱領於此亦可見或錯而分綜而合參之兩之參兩之制亦必伍也是則參伍之大通變太極數也孔子謂通其變遂成天地之文極其數遂定天下之象非天下之至精至變至神孰䏻與於此誠哉言也故夫參天者成象謂乾於是參陽數之三三以統乾元用九而參中有兩陽中見隂兩地者效法謂坤於是兩隂數之二二效法於乾遂參其三而六之以㑹坤元用六而兩中用參隂中見陽以是見一隂一陽變而通之於天地之間所以必參兩也參之兩之所以必九六也且太極而兩儀所以四象而八卦不過生數之一二三四成數之六七八九而已至於五與十雖有其數特存虚用未嘗列於卦象之實體者也葢自一分一而二一二而三一三而四是四象立矣四象无五也天五特虚中而无體然一四而五二三亦五是兩伍矣具以本數之天五又參伍矣况一二三四自然緫而十數中以天五參伍而十五也天數之一三五則九地數之二四則六而一五亦六也一六而七二五亦七也一七而八三五亦八也一八而九四五亦九也則八卦成列矣一九則十一二三四自然亦十也八卦則无自而十也十故无所容其體以一用其二三四則其十亦特九也十之為九乃所以復歸於一是十即一也河圖之數四方各十故坎一與離九相對而十中虚天五之用而十五坤二與艮八相對而十中虚天五之用而十五巽四與乾六相對震三與兊七相對而十中虚天五之用而十五以是知天五與地十皆无其體與位之正特虛用其數以相十而什伍也斯所以參伍也參伍所以參兩也故河圖之數止實四十而以天五地十之虚數通用之以計凡天地之數五十有五者也七為少陽八為少隂其合固成十五然其生數不備不能變九為老陽六為老隂其合亦雖只十五而生數之一三五而九二四而六故六之變則九九之變則六此通重易之爻不見七八而无非九六而參伍以變參天兩地莫非是也四方之數各十合參其九而二十有七兩其六而一十有二緫之則三十有九而特遺其一則其一將何所用乎故以其一存諸十則四十矣故坎之立極于一歛其十以自歸以建大中以生生數之始以成成數之終退藏於宻而莫之究極見於參天兩地倚數之一以為十則所謂中也中也者合數之所不得其中者而使之交合於中所以中其不中者也由坎北之一始制於中二效之而分兊西之七以為中八效之而分震東之三以為中四效之而分離南之九以為中凡中皆立於十皆以數合於十而中分之者葢以寄其一云爾惟坎之一獨无所可用特立於中而以无用之用而用有用之用則中之用不既大矣哉故坎之一雖不在參兩參伍之用而用之以制參天兩地參伍之制焉故參天不自坎而自艮始也參亦非它即前所謂一二之變也一自分其一以為一起而相對則見其二而不見一其一又自參出於二之中故曰參也此參制之一小成然參兩參伍莫不於是焉起斯故示其參之凡也易圖通變卷二
