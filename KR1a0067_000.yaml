body:
  text: 易圖通變易類易筮通變提要臣等謹案易圖通變五卷易筮通變三卷宋雷思齊撰思齊字齊賢臨川人宋亡之後棄儒服為道士居烏石觀後終于廣信事迹具袁桷所撰墓志銘是編前有揭徯斯序稱所著有老子本義莊子㫖義數十卷及和陶詩三卷吳全節序又稱其有文集二十卷今皆未見惟此二書存其易圖通變自序謂河圖之數以八卦成列相蕩相錯恭天兩地參伍以變其數實為四十而以其十五會通于中所述河圖洛書參天兩地倚數之圖錯綜㑹變等圖及河圖遺論大㫖以天一為坎地二為坤天三為震地四為巽天七為兑地六為乾天九為離地八為艮而五十則為虛數其說雖與先儒不同而按以出震齊巽之義亦頗相吻合林至易禆𫝊序所謂易道變化不窮得其一端皆足以為說者也其易筮通變凡五篇一曰卜筮二曰立卦三曰九六四曰衍數五曰命蓍亦多自出新意不主舊法白雲霽道藏目録載二書于太元部若字號中蓋圖書之學實出道家思齊又本道士衍說之以附于易固亦有由云乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書易圖通變序道德數千言吾教之所獨尊古今未有䏻廢之者然𫝊注層出渺茫叢惑莫適指歸徒見多岐之紛紛也雷思齊嗜學有要精研是書探核本旨為之𫝊釋合儒老之所同歷詆其所異條分緒别終始一貫不翅入老氏之室避之席以相授受也其將學是者終究其說知其𤣥之𤣥而不昧其所嚮𫝊之將來庶幾於吾教非小補也至元丙辰嗣天師簡齊張宗演序雷先生思齊字齊賢臨川之髙士也遭宋亡獨居空山之中著易圖筮通變義老子本義莊子旨義凡數十卷和陶詩三卷去儒服稱黃冠師與故淳安令曽公子良今翰林學士吳公澄相友善四方名士大夫慕其人往往以書疏自通或聞其講學莫不爽然自失故翰林侍講學士袁公桷博雅君子也稱其所著書援據精切感厲奮發合神以窮變盡變以翼道且曰知齊賢不如是齊賢之意不明方今天下稱為斯文宗主莫先吳公天下稱善著書莫先吳公亦曰與談老子甚契又稱其詩精深工緻豪健竒傑有杜韓風蓋皆以為知言嗚呼古稱虞卿非窮愁不䏻著書太史公世掌天官使不遇禍史記不作夫求雷先生之志讀雷先生之書遑與世俗道哉遑與世俗道哉余讀其所著之書想其為人幾五十年今又得其詩文二十卷於其徒孫傅性真與周惟和𫝊入京師來因識以辭至順三年三月揭傒斯書昔世祖皇帝既定江南首召三十六代天師入朝未幾天師奉旨掌道教還山遂禮請先生為𤣥學講師以訓迪後人余時雖幼而有志於學遂受學於先生先生嘗誨余曰文章於道一技耳人之為學將以明斯道也不眀斯道不足以為聖賢之學矣余由是日知所省益自奮發及弱冠入侍先師開府公於朝遂不得事先生以終學焉先生嘗注易圖筮通變義老子本義莊子旨義凡數十卷詩文二十卷至順二年秋先生之徒弟傅性真遣徒孫周惟和持所著諸書來京師示余且曰先生所注之書雖有黃公震曽公子良吳公澄為之序而未得公一言以發眀之敢以為請余曰嗟夫先生之歿逮三十年矣今不可得見得見所注之書斯可矣然先生之學豈所注之書可能盡哉後之觀者考諸書則知先生之學誠不止若是也余今且老久留於朝常欲集先生諸文而序之未果也今諸文既已成編又豈敢默默無一言以發眀先生之學哉故續為之序先生諱思齊字齊賢學者尊之曰空山先生撫之臨川人也至順三年嵗在壬申六月旦日吳全節序河圖八卦是也圖之出聖人則之庖犧氏仰觀象俯觀法近取身逺取物以通神眀之德類萬物之情始因之畫八卦以作易者也孔子謂其則之豈欺我哉圖之數以八卦成列相蕩相錯參天兩地參伍以變皆自然而然後世不本其數實惟四十而以其十五㑹通於中乃妄計天地之數五十有五以意增制於四十之外以求其合幸其中故愈說愈迷紛紛迄今余因潜心有年備討衆說獨識先聖之指歸遂作通變𫝊以與四方千載學易者同究於真是焉兼筮法亦乖素旨附見後篇求古同志宜能眀其非敢誣也大元大德庚子九月臨川道士雷思齊齊賢序
