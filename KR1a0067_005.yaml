body:
  text: 易圖通變卷五宋雷思齊撰河圖遺論古聖人之王天下創始公至理以惠啓千萬世者豈易易然率己見以自擅制作哉此有天授斷可識矣故河之出圖伏羲因之以則而畫八卦洛之出書大禹因之以則而叙九疇孔子於大𫝊叙天生神物聖人則之而兼及圖書而謂其兼則之也子不語怪力亂神豈無所見於真實而自樂為虛誕以愚欺天下後世哉自稱庖羲氏之王天下仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物始作八卦以通神明之德以類萬物之情是豈先聖後聖各以私意淺識得措乎其間哉易之廣大配天地變通配四時隂陽之義配日月其為書廣大悉備與乾坤相為終始而無弊非有天授能為是乎此孔子有見於圖書之出特謂則之而已無它說也况圖之自見於成康顧命陳之東序之後無所復聞孔子固己自悲其不出而有己夫之歎漢儒之始孔安國乃由書𫝊於河圖東序之下謂伏羲王天下龍馬負圖出河遂則其文謂之河圖於天乃錫禹洪範九疇之下謂天錫禹洛書神龜負文而出列於背有數從一至九禹因而第之以成九類類即疇也是二說自分載於洪範顧命各篇本語之下亦未之有它說也至鄭康成始引春秋緯合注大𫝊之圖書云河以通乾出天苞洛以流坤吐地符河圖龍發洛書龜感河圖有九篇洛書有六篇已是詭說之開端然仍引安國之注以為河圖八卦是也洛書九疇是也其後王輔嗣韓康伯於此並無所注釋惟孔穎達易疏雖全篇寫鄭注亦謂輔嗣之義未知何從是必未以鄭注為然也及其疏書之洪範乃又引繫辭云河出圖洛出書聖人則之九類各有文字即是書也而云天乃錫禹知此天與禹者即洛書就引漢書五行志劉歆以為伏羲繫天而王河出圖則而畫之八卦是也禹治洪水錫洛書法而陳之洪範是也河圖洛書相為經緯八卦九章相為表裏附說先達共為此說龜負洛書經無是事中候及諸緯多說黃帝堯舜禹湯文武受圖書之事皆云龍負圖龜負書緯候之書不知誰作通人討核謂僞起哀平雖復前漢之末始有此書已前學者必相𫝊此說故孔以為九類是神龜負文而出列於其背有數從一至九禹見其文因而第之以成九類法也言禹第之者以天神言語必當簡要不應曲有次第丁寧如此故以為語第之也全文其疏顧命之河圖東序及疏記之河出馬圖詳略雖小有殊同指意大校若此是則所謂河圖為八卦所謂洛書為九疇並無改議也由漢而唐易經行世凡經𫝊疏釋之外未有及於圖書之文刋列經首者逮故宋之初陳摶圖南始創意推眀象數自謂因玩索孔子三陳九卦之義得其逺旨新有書述特稱龍圖離合變通圖餘二十是全用大𫝊天一地二至天五地十五十有五之數雜以納甲貫穿易理內一圖謂形九宫附一圖謂形洛書者則盡去其五生數祇起地六至地十自釋十為用十為成形故洪範陳五行之用數語而已及終其書再出兩圖其一形九宫者元無改異標為河圖其一不過盡置列大𫝊五十有五之數於四方及中而自標異謂為洛書並無𫝊例言說特移二七於南四九於西莫可知其何所祖法而作而標以此名大抵因如前說洪範五行之二火四金太𤣥準易因之為二南四西而然然其流𫝊未逺知者亦鮮自圖南五𫝊而至劉牧長民乃增至五十五圖名以鈎隱師友自相推許更為唱述各於易間有注釋曰卦德論曰室中語曰記師說曰指歸曰精微曰通神亦總謂周易新注每欲自神其事及跡而究之未見其真能有所神竒也時則有李覯泰伯著六論以駮其非是至謂愳其詿誤學子壞隳世教而刪其圖之復重存之者三焉河圖也洛書也八卦也夫長民之多為圖畫固未知其是而泰伯亦元未識此圖之三本之則一爾河圖本列八卦而數五十有五也及長民輩始破洛書古說謂非只是洪範必别有書出於羲之上世羲乃得而并則之以作易也泰伯之見則又與之同此愚又莫能知何為其然也蓋嘗夷考大𫝊此章自有法象天地變通四時縣象日月而又有及於蓍龜故因謂之天生神物聖人則之者正謂蓍也易惟蓍是用所謂蓍之德貟而神幽贊於神明而生蓍易豈有龜事哉因其均可以占故牽聯及龜爾以上文謂法象天地變通四時故申之曰天地變化聖人效之上文謂縣象日月故申之曰天垂象聖人象之至于天生神物乃申謂之如河出圗洛出書聖人亦得以則之也蓋由河之出圗羲前既得以則而畫卦因及於洛之出書禹後復得以則而叙疇爾又豈害于比類而互言之哉豈嘗直欲以圗書之數之義之條貫比而同之哉豈嘗直謂圗書並出於一時哉且不惟漢儒引洪範以為洛書雖圗南之初謂形洛書者亦不過謂十為用十為成形故洪範陳五行之用也者是明指洛書為洪範矣不知長民輩不本其初故倍其師𫝊而謂洛書非出於禹之時益使後之人迷亂而失所據依何也又不謂孔子之謂聖人之則之也非特八疇分布四正四維五行置于坎一五事置于坤二五紀置于巽四五福置于離九一以九疇之次叙陳列于河圗之卦次夫九疇謂禹次第之者直自初一次二次三四而以次用之也今隨河圗十五縱橫而置之則成亂次矣未暇一一辨詰且以初一之五行言之既謂五行自當分配五方何得以五者限萃一方不以推行惡得謂五行哉以至謂火金易位與河圗不同其顛倒迷􅓎不可訓知若此其後楊次公自著洞極經託名于關子明其叙本萹稱子曰河圗之本七前六後八左九右聖人觀之以畫八卦是故全七之三以為離竒以為巽全八之三以為震竒以為艮全六之三以為坎竒以為乾全九之三以為兊奇以為坤正者全其位隅者盡其畫而謂四象生八卦此謬之尤者乾坤相索而生六子今為男女者反䏻生父母之卦邪况泛言二七為火四九為金猶可謾所未識者今至眀言離九為七兊七為九是河圖一可變置矣而可乎又謂洛書之文五處其中九前一後三左七右四前左二前右八後左六後右後世稽之以為三象因而九變之以二十七象今案其說惟五處其中一語於洛書不悖餘悉河圗之數而河圖之數乃因洛書以五處中而盡失其所以為五之理爾書之九疇以皇極之五處中固無别用是可以定去羲之時將幾世幾年雖祇去禹之世固已千數百年矣其稱書之出洛以比羲之圖之出河於理惡乎而不可長民故為此說是且并孔子之大𫝊不之信邪考圖南之為龍圖雖自謂得於孔子三陳九卦之旨而作然其序曰龍圖者天散而示之羲合而用之孔默而形之且明稱始圖之未合惟五十五數則是謂大𫝊天數二十有五地數三十合而言之不知何以於其末改標之以為洛書殆其始誤也長民輩乃承誤而益增其誤遂真以為洛書而有五十五圖以實其誤以至泰伯已後悉以圖南之標異之五十五數為真洛書也不思圖南標洛書之始偶謂用十夫洛書所叙九疇其十數當何從而起哉意豈謂大𫝊之河圖既可出而示世則洛書亦可以并出示之因假大𫝊五十五數託為書之九疇乎九疇所言皆用縱比而同之謂五十五數其用又安在哉此不可之大者也故嘗因長民之事討其原圖南之後种放許堅李溉未及見其它有著述若其所親授之師如范諤昌所著大易源流其稱龍馬負圖出河羲皇窮天人之際重定五行生成之數定地上八卦之體故老子自西周𫝊授孔子造易之原天一正北地二正南天三正東地四正西天五正中央地六配子天七配午地八配卯天九配酉地十配中寄於末乃天地之數五十有五矣因考其既以圖之前五數置於北南東西之正及中復以後五數配子午卯酉及中何也夫子午卯酉非四方之正邪地十配中云寄於末夫中抑有末邪諦詳所置之數正令圖所傳有四方而無四維之數者是諤昌巳元不識圖南所以標異特因太𤣥準易取於洪範一水二火三木四金五土而然鑿空無故造端老子增立怪論以實圖南易置二七四九之位爾然猶未嘗以九疇分配九宫也究核諤昌之取用不過循納甲之緒餘及五子歸庚之殊嚮又謂天上八卦坎離對中之外移置乾兊坤於東艮震巽於西不謂五行之說多起於易後而反引五行以為定卦之原此又其敢於創異之大端也是冝長民不獨增以五十五圖又因諤昌坎離震兊四正之外而以四成數同於四方謂坎六退本卦三數以餘三數三畫為乾離七退本卦三數以餘四數四畫為巽震八數退本卦三數以餘五數五畫為艮兊九數退本卦三數以餘六數六畫為坤皆以數為畫標為河圖是不揣本而齊末夫八卦各三畫以剛柔生爻未聞本卦只用三畫而以其餘畫之多反分為别卦也所陳之數抑配偶然且以坎離震兊為四象則尤非也象本在未成卦之先故曰四象生八卦也又云洛書之九疇本河圖自然之數虛皇極於中而以位也至河圖之有天五乃兼地十以為十五其五乃四分於成數之內而合於十豈嘗有五虛㸃而實置於圖之中位哉圖之𫝊誤正由此五次公之假設此妄例特以蓋其所祖者乃揚子雲三方九州而二十七部私以為書耳於斯二者固已真易置圖書矣而朱元晦蔡季通反祖之信以為關子眀作也不計子明之易𫝊精詣豈此摹擬者比乃循此膚臆之見因扶其說亦謂河圗七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右謂大𫝊既陳五十有五數洪範又謂天乃錫禹洪範九疇而九宫之數戴九履一左三右七二四為肩六八為足正龜背之象劉牧意見以九為河圖十為洛書託言出於希夷與諸儒舊說不合又引大𫝊以為二者皆出于伏羲之世其易置圗書並無明驗其朱蔡之指斥又如此而直以圖南始標誤之洛書為河圖而以其初正指河圖反以為洛書則朱蔡實自誤而反罪長民之先誤専己自是張其辨說不克自反一至於此惟程泰之易原時能理到至鄭東卿輩尋迹依傍一意誕謾廣增圖說皆非實指徒使後之人失其真是信其所不當信疑其所不當疑并與本來宗旨樊然擾亂是其所非而非其所是蹟究其始不過由圖南用十之一語立一圖之誤至於為此紛紛始猶借河圖以相因依而為洛書之說久則捨圖取書又久乃遂以書為圖荒然莫知河圖為何物所以有圖者實為何事執其五十五數以為圖不知其五十五數其始特以誤及洛書今反執之為圖是圖既非圖其謂書以為圖者書益非其書者矣徒自言人人殊使學者亡羊多岐求馬唐肆紛如聚訟吾誰適從不啻三百年於此故推原致誤之由疏列群疑之妄直以河圖本數討正之庶幾學者見之瞭焉㑹心自斷知圖南之謂其由三陳九卦而得者類於謾隂陽家襲於以一六八白取以為起例者流於末若乾鑿度以謂太一取其數以行四正四維皆合十五者鑿於緯之拘贅亦不盡然然從昔儒先莫不斷斷然謂非人所能僞作者今以余自本觀之直謂不必它求特以說卦帝出乎震一章環中往復參究之以天一至地四地六至天九求其實體天五與地十眀其虛用則參伍以變參天兩地錯綜倚數莫不左右逢原一皆吻合乎孔子繫易之初旨是之謂衆言淆亂折諸聖則明河之出圖通古不妄足以見易矣因洞悉洛之出書九疇之外豈復有圖有數之妄作者誠古今之一大快事也易圖通變卷五
