body:
  text: 易筮通變卷中宋雷思濟撰九六易始於隂陽之畫而陽之畫􅅀而為竒陰之畫􅄲而為耦由乾之畫分而為震為坎為艮三卦之竒坤之畫分而為巽為離為兑三卦之耦故曰陽卦竒隂卦耦陽卦多隂隂卦多陽雖竒耦少多若可數計而未始謂􅅀為九􅄲為六也聖人之作易觀變于隂陽而立卦則天之道曰隂與陽發揮於剛柔而生爻則地之道曰柔與剛故易六畫而成卦分隂分陽迭用柔剛六位而成章其曰畫曰位者是所謂卦爻也豈嘗有九六之分哉由重乾卦之畫之位皆陽竒之爻而爻辭上必繫以九且有用九之例重坤卦之畫之位皆隂耦之爻而爻辭上必繫以六且有用六之例而凡卦之爻莫不各繫以九且六學者積於所見所聞之成習以此誠為九六也從而九六之無復討其所以然者竊自異之夫九六數也大𫝊曰極數知來之謂占通變之謂事蓋九六也者占變之事也始乎參伍以變錯綜其數天數五地數五天數二十有五地數三十凡天地之數五十有五所以成變化而行鬼神者未嘗即謂其九六也由天數謂一三五七九而後知其積為二十有五地數謂二四六八十而後知其積為三十由五位相得而各有合乃以五已前為生數五己後為成數而一合六謂水二合七謂金三合八謂木四合九謂火五合十虛謂土是九六槩見其間而未著所以用也五位已前其體數五位己後其用數也體之生數以天一天三天五參之而九地二地四兩之而六參天兩地而倚數參參而九參兩而六於是九六特啓其用也故以一四而伍二三而五五因兼而五是參伍之始變而以一伍五而六二伍五而七三伍五而八四伍五而九五虛伍而十因以五兼十而十五七兼八而十五九兼六而十五是所謂參伍以變錯綜其數者也凡九六七八之數均得以地數之成而成其天數之生也者是所謂成象也是一五而六為老隂二五而七為少陽三五而八為少隂四五而九為老陽是九六七八實相變為用也世雖知隂陽之少者不變老者則變而習見於易全書之畫凡卦之爻􅅀竒之陽其下分繫以九􅄲耦之隂其下分繫以六而不知􅅀之畫實七􅄲之畫實八也何以明之易變易也極數知來之謂占通變之謂事謂其占變之事具揲蓍法四營而成易十有八變而成卦每三變而積為一爻以四與八為竒耦而每三變各得一四二八則象震象坎象艮則皆畫為􅅀之竒每三變各得一八二四則象巽象離象兊則皆畫為􅄲之耦蓋寓隂陽相索為六子之意以三變皆得四始畫為十以象乾三變皆得八始畫為以象坤凡一四二八之積為􅅀之定畫是謂七一八二四之積為之定畫是謂八此兩者其不變者也惟三變純四謂陽竒之極為之動爻是謂九三變純八謂隂耦之極為之動爻是謂六此兩者皆其變者也凡􅅀竒􅄲耦之定畫所以悉列於各卦之首者不取其動而専以標剛柔之體不變而畫為定卦至九六之變爻雜然交寓於各卦之內者不列於畫而專以寄隂陽之用適變以動而為之卦而乃所以著其用九用六者也乾鑿度曰陽動而進隂動而退故陽以七隂以八為象陽變七之九隂變八之六也朝說之以道曰古者畫卦之竒耦為隂陽而卦爻但有六位而未有七八之名因揲蓍衍易以老陽之變九老隂之變六少陽之變七少隂之變八周易之七八即古之竒耦也易筮之九六見於卦爻則變焉如六位皆九即乾之坤六位皆六即坤之乾也此則用九用六之例足以明與今我所見實同然也今之左𫝊之所紀復有可以相明而且有不得不究其所注之失者魯穆姜薨于東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出姜曰亡是於周易曰隨元亨利貞無咎元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事然固不可誣也是以雖隨無咎今我婦人而與於亂不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死是宫不得出矣故嘗因是艮之八之筮尤有以審七八之定畫不為九六之動爻而注則誤矣周禮大卜掌三易以行九筮則曰連山歸藏周易謂其經卦皆八其别皆六十有四是易雖三名筮則同一法也其以七八為卦畫之體以九六為卦爻之用是以謂艮之八也艮之變其初之賁三之剝四之旅五之漸上則之謙遡明其筮是艮之一卦凡六爻而爻之變者已凡五卦之之者亦五矣史雜而視之無所適從於斷也惟二爻之􅄲隂耦無所變無所之爾故覆而斷之以艮之隨也且即稽其筮而曰隨其出也君必速出姜則自審無以當此卦之德也因謂是於周易曰隨元亨利貞無咎就申其釋之者如上云耳曷嘗引連山歸藏二易而且有所更筮哉杜氏不明周易之筮􅄲耦之畫本只謂八乃妄指二易以七八為占且又謂史疑占易遇八為不利更以周易占變爻而論之何其誤也由今核之則七八之為卦體之成畫而不名九六不亦明矣哉國語晉公子重耳筮尚有晉國得貞屯悔豫皆八韋昭注震在屯之內卦兩隂爻不動震在豫之外卦兩隂爻亦不動故曰皆八是其徴也董因又筮之得泰之八昭又注泰無動爻隂爻不動其數皆八則􅄲為耦畫之不動者皆為八又其徴也由􅄲耦之畫不動者皆為八則􅅀竒之畫不動者皆為七校然明甚矣今易之全書不見七八而惟見九六學者冥視其用九用六之文承誤於九六之分而未明九六之例所以用者其槩如前所論為之卦設也合左𫝊凡云某卦之某卦者皆以爻之動而變者指其所之云爾所謂唯變所適也以筮者尚其占以動者尚其變爻也者言乎其變者也聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之動而不可亂故曰六爻之義易以貢也以是研之定爻之􅅀􅄲固自七八而於其動則七乃進為九而含隂八乃退而六而含陽也𫝊於占之變卦之爻固悉如前之卦之說而於蔡墨之答魏獻子之問龍尤曉然著白也曰周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍無首吉坤之剝曰龍戰于野則足以見􅅀七􅄲八之動而變始得謂九且六也不然則乾之諸爻謂九者其辭分配固如潛龍勿用等云而坤之上六其辭固云龍戰于野又何必枚舉乾之姤坤之剝等卦然後始稱其本爻九六之下文以為所之之辭而申見其例也哉况乾卦於用九之下文曰見羣龍無首吉而墨乃特謂之坤然後釋之方如所云則凡用九為爻之變畫例此不約而合尤未深切著明可以不言而信矣其所以每爻先引之卦而始徴以其辭者以見七之變進而始為九八之變退而始為六也由是以夷考於𫝊凡所舉之卦之辭則每爻之為九為六者必待七八之動而變乃然也故有用九用六之例是九六之用如乾之初至上皆必待陽竒之七動而變始謂九坤之初至上皆必待隂耦之八動而變始謂六如朝氏云九六見於卦爻則變六位皆九即乾之坤六位皆六即坤之乾也乾鑿度重見其說陽動而進變七之九象其氣之息隂動而退變八之六象其氣之消也又謂乾三十二世消坤三十二世息也故易大𫝊曰乾坤其易之門邪蓋由乾坤之門以入則凡諸卦必倣此以通每卦之變而始為九六也故用九用六不見於他卦而特見於乾坤者蓋不止為乾坤設實并他卦例以用之也故占法謂六爻皆不變者則斷以本卦之彖辭五爻皆變一爻獨不變者則斷以之卦爻之不動者之彖辭而不用爻辭者是其爻不動不得以名九六故也歐陽永叔曰乾曰用九坤曰用六何謂也曰釋七八不用也乾爻七九九則變坤爻八六六則變易用變為占故以名其爻也朱元晦甚稱其說則又曰乾坤之用九用六何謂也曰乾爻七九坤爻六八九六變而七八無為易道占其變故以占者為爻不謂六爻皆九六也及其筮也七八常多而九六常少有無九六者焉不可不釋也六十四卦皆然特於乾坤見之則餘可知爾且謂其按此說發明先儒所未到最為有功論七八多而九六少又見當時占法三變皆卦如一行說今愚又以是觀之朱之所說惟見歐說若朝說朱蓋所未見也至若乾鑿度等書儒者又鄙之以為易緯不惟不取至有不觀有不見者而不知其有可參考也自今校之古今所見固有不求同而同不期然而然者然皆未及於九六之所以然如左𫝊之卦之徴驗以為易道缺事故得兼載其詳然余復審朝氏謂卦爻見九六不見七八特其致疑而然非真有見於九六者也謹按說卦昔者聖人之作易幽贊於神明而生蓍者是已明著用筮之法矣其謂參天兩地而倚數者蓋參其三三而九為參天已見乾元用九兩其三二而六為兩地已見坤元用六是九六之用所由始也觀變於隂陽而立卦者是所謂立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦足以見標竒耦􅅀􅄲於卦首不動為定畫乃寄其七八也至於發揮於剛柔而生爻者爻與畫異爻之未變而動為畫畫之既動而變為爻故易六位而成章此卦畫六位自初至上分隂陽定位而以剛柔迭用於其中變動不居周流六虛上下無常剛柔相易惟變所適或參天而九或兩地而六用九用六九六所以變動於各爻因以生之卦者也九之與六何疑之有聖人有以見天下之賾見天下之動擬諸形容觀其㑹通繫辭焉以斷其吉凶故謂其成章也其立言易簡而理得所以示天下後世者至昭昭也學者既其名未既其實終身由之而不知因疑生解乃以為獨有所見自著其說蓋可悲已故為之特發揮於是易筮通變卷中
