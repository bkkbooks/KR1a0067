body:
  text: 易圖通變卷三宋雷思齊撰河圖𫝊下道家以日月為易始蹈常襲故未始為然卒究於大𫝊則未始不然曰乾坤其易之藴邪乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或幾乎息矣是猶未識所見之易為何物也則又曰乾坤其易之門邪乾陽物也坤隂物也隂陽合徳而剛柔有體以體天地之撰以通神明之徳是易之為物有體可以見矣則又曰闢户謂之乾闔户謂之坤一闔一闢謂之變徃来不窮謂之通見乃謂之象形乃謂之氣制而用之謂之法利用出入民咸用之謂之神是易之謂體者又見其有用矣故曰天地設位而易行乎其中矣曰法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月曰廣大配天地變通配四時隂陽之義配日月凡是數端莫不舉日月以徴則信其為易也完矣夫易與天地準能彌綸天地之道仰觀象於天俯觀法於地則成象謂乾者日也效法謂坤者月也日象離數極乎九月象坎數始乎一凡九必對六今云一者一合天五為六坎一乾六為水生成所以為月者也且天地乃乾坤之體乾坤乃天地之用惟天地定位而上下氣形有不易之分故乾坤成列而隂陽體用有變易之數天地有常體而莫見其用隂陽有常用而莫究其體惟日月之體用兼著故特著其義以配隂陽云爾且明教以範圍天地而不過曲成萬物而不遺者特通乎晝夜之道而知也夫晝夜之道豈難知哉百姓日用而不知爾請畧舉其凡乾陽物者日其類也坤隂物者月其類也隂陽成列而合徳者四時合序日月合眀闢户謂乾近則日之出旦月之上弦逺則春之日夜分而謂啓也闔户謂坤近則日之入夕月之下弦逺則秋之日夜分而謂閉也仰觀其成象則日之晝月之望夏之景長而至俯察其效法則夜之分月之朔冬之景短而至也是以日徃則月来月徃則日来日月相推而明生焉寒徃則暑来暑徃則寒来寒暑相推而嵗成焉變化者進退之象也剛柔者晝夜之象也日月運行一寒一暑故曰天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也貞夫一也者四時分至之中皆一也而此特謂天下之動貞夫一則正由坎之一也一日之陽起初動於夜分之際固謂貞夫一也一年之陽氣復動於冬朔之始尤見其貞夫一者也坎之數一離之數九坎離以一九為乾離為日坎為月日月必合於月之初一為朔而日不云朔月乃云朔南不云朔北乃云朔夫朔逆度也逆與日㑹故謂之朔以朔文觀之明著月之逆度者也說卦曰易逆數也書亦曰平在朔易理實同也由是以進乎日月之為易其縣象得不謂著明矣乎故月之三五而盈少隂陽之七八三五而闕老隂陽之九六緫之以地數三十而月盡又河圖法也周天三百六十五度四分度之一日每行一度冬南夏北為寒暑之中極月行每十有三度而竒與日之合者十有二朔而嵗常以備六隂六陽十有二月天地節而四時成是月之運行勞亦甚矣其稱坎為勞卦者不徒謂水也此坎之一數不入於參兩參伍之制而特著其動之始也中之始也合而言之天地者體也隂陽者用也體者形所以用其氣用者氣所以體其形天以氣體其形故其形下包乎地地以形用其氣故其氣上行乎天是天之氣全體乎地之形而地之形全用乎天之氣此又參兩之制得以明之也一之始參三之終參皆天也而并位乎平地之上如乾者老陽也乃附於成數之六隂位乎隂地西北偏極乎退數之終艮者少陽也乃附於成數之八隂位乎陽地東北偏立乎進數之始而特以坎中之一陽不在參兩之用者因其始生自然之一介然特立於隂陽終始之際起嵗之朔月之朔以體生生之謂易斯足以明地之體全用乎天矣一始之兩二終之兩皆地也而兼列於平地之上如巽少隂也雖以附地生數之四隂位乃在東南偏陽氣升已過中之進數坤老隂也雖以附地生數之二隂位猶在西南偏陽氣降未及中之退數且兼兩地并以奉中參天位之極當天之極髙日之極中斯足以明天之用全體乎地矣以是知參兩之制非有日以定其晝夜長短有月以更其朔望贏縮則天地之氣形體用隂陽之變化生成其升降進退之變通分合出入之歸宿則惡從而討其真是哉故嘗由是以参之制數之元矣天一之始自北而中而分地二於西南不得謂天地定位者陽正而下隂偏而上也二得名坤一不得名乾者一起於坎也由一参二以為三以前而東葢所以見人参於天地之中以生而動於震因兩其二而四附以順而相入之巽虚生其象以為四然象非實體也象天地與人極男女之相配以始者爾一與三之陽自然已各據其中而二與四之未中未有以正之可遂已乎故有待取用於成數之交合以成其正也五雖虚位於中而有其數可制其用一交五而以其一相配而成六於乾二交五而以其二相配而成七於兊三交五而以其三相配而成八於艮四交五而以其四相配而成九於離然後始謂之成象成象則謂之乾而效法則謂之坤矣乃得謂之天地定位也其實一自合一二自合二三自合三四自合四特以交五而變爾於是坎一之陽合而成乾六之隂坤二之隂合而成兊七之陽震三之陽合而成艮八之隂巽四之隂合而成離九之陽其始正者合而輔於偏始偏者合而歸之正於是八卦成列而象在其中矣亦惟一之自中坎獨自若而不入於數而河圖参天兩地參伍錯綜之變得以行乎其中也故由參天之制皆用九而知九為乾之用由兩地之制皆用六而知六為坤之用葢乾之始参於艮八而不足於數則取震之一而九之中参當陽極而體數之全无餘不足則自九之終參則取兊過中有餘之三以奉乾六之終而九之兩之始起數於震中之二以合巽四之不足而六之兩之終起數於坤之本二以合兊中有餘之四而六之是明参兩九六所用之槩也或有謂坤二與兊七而九乾位自得六數亦自成九六也曽不識兩之制皆終地上参之制皆終地下又焉得而易之哉况乾本九也今數乃損而六坤本六也今數乃増之而九者尤足以明老隂之六變而之九老陽之九變而之六而卦爻之所以成九六也由参天之用必九兩地之體必六下繫之首曰八卦成列象在其中矣因而重之爻在其中矣而後世乃謂易畫之重非由羲始吾不信也且說卦謂說言乎兊成言乎艮凡再言其山澤通氣者即咸卦也咸之彖曰二氣感應以相與止而說天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣其雷風相薄者即恒卦也恒之彖曰雷風相與巽而動天地之道恒久而不已也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣遡求於下經之人道攸始則説卦重卦其􅈲一毫不悖也故愚謂重易斷自羲始不然禮謂三易其經卦皆八其别皆六十四其欺我哉求易之道試以是進之説卦曰聖人之作易也参天兩地而倚數觀變於隂陽而立卦𤼵揮於剛柔而生爻因参稽其所以参兩者其得於河圖无間然矣且帝出乎震一章尤河圖之大講明也特截自震起於泰中環周而訖於艮寓夏正之嵗更爾故曰終萬物始萬物者莫盛乎艮曰艮東北之卦萬物之所成終而所成始意葢謂又始於出乎震者也此實孔子特以變通四時言也而於通乎晝夜之道而知則未及悉也夫兩之制並起於平地以奉中參者自春而秋以分必極於夏之至者亦晝之象也始終之参皆在地中者自秋而春以分必極於冬之至者亦夜之象也請以日用常行變而通之則出乎震者人之始作於旦也古謂震旦所以騐也齊乎巽者動而相與之交也相見乎離則交際之極也致役乎坤則動極徐静也說言乎兊休且入也自震至兊此晝之體用人所同見至於戰乎乾卒取終參之制其數之九則存兊餘之三嚮晦入息於乾六以終也隂陽相薄閉塞不用之時也然終則有始至於勞乎坎則夜分之氣復動準於七日之復則同也成言乎艮則逺接兊餘之三說言乎兊也山澤通氣感而相與雖止於其所而時行則行斯人事之又興始者也變化者進退之象也剛柔者晝夜之象也吾見自羲文以来河圖之一隂一陽進退升降徃復循環周流不息開古訖今逺之一嵗之冬夏邇之一日之晝夜莫不由斯道也吾日用常行不在它求参天之道自艮始者於是乎在其視太𤣥以七百二十九賛之準易皇極以元㑹運世之旁通各以一朞之嵗月日時為數例視今通其變極其數於河圖日可見之行也豈不易簡而理得哉斯非至精變而神者歟易圖通變卷三
