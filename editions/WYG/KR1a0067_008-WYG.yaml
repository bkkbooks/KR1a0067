body:
  text: 易筮通變卷下宋雷思齊撰衍數天地之數五十有五以天數之一三五七九而二十有五地數之二四六八十而三十宜乎㫁斷乎不得有所損葢而大衍之數遽損其五而特謂之五十是以求其理而不得稽其數而不合卒莫之要其宿人莫不有説説莫不有其理之似而卒未有㑹其眞是者古猶今也列子之書儒者梏於𫝊習葢所不取所不觀殊不察其首篇謂聖人因隂陽以統天地夫有形生於無形則天地安従生故曰有太易有太初有太始有太素太易者未見氣者也太初者氣之始也太始者形之始也太素者質之始也氣形質具而未相離故曰渾淪渾淪者言萬物相渾淪而未相離故曰易也易變而為一一者形變之始也是説也重見於易緯乾鑿度亦固謂然也由是而觀則易之有太極而太極也者特渾淪之寄稱爾渾淪而上既有謂易謂初謂始謂素凡四其稱而至於渾淪而五故以渾淪為太極是之謂五太也是則太極也者既先含其五於中矣故天地之數五十有五而大衍之數乃五十者既虚其太極已上之五而取用於五十之妙也大𫝊曰生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神葢謂是也由是知易有太極之為一而一所以為形變之始矣既謂易有太極而又謂為生生之謂易而遂繼以成象之謂乾而不及太極何也是未識夫易者葢隂陽之總而太極者特隂陽變化之宗㑹焉爾故曰易變而為一一者形變之始也易由太極以標其一所以為成象之謂乾即所謂形變之始而乃所以為一也由乾分其一􅅀以為二􅄲而始謂之坤是大衍五十不用之一象之為易有太極之一而一之分為􅄲所以象兩夫兩不謂二而謂之象兩正以􅄲之分也故大衍之五十先尊其太極不用之一以為生生之本而謂其用四十有九者葢由一之二其一以生兩儀􅄲是分而為二以象兩一又參其一以為三才之道是掛一以象三􅅀復亖其一為四象則北南東西之判冬夏春秋之序水火木金之位莫不由是以著則所以揲之以四以象四時者也而河圖之數所以四十者也然天地之數五十有五大衍之數則五十天五既無位於四象地十又無位於八卦何其不合若是之甚也天五之有數而無位者五之文古之體為象一亖交互以為五今之體為見隂陽之亖交變於二之中以為五而十之體亦兆見於此五固為土而土之文為為十為一其始於一而中於五而終於十而復歸於一乎土亦無正位故四象無五八卦無十也葢嘗探索於天地之數五十有五之元矣四象之一二三四所以為八卦者不過再用一二三四而各以五參之為六七八九爾其數止四十八卦之一九而二八三七而四六相交而十之其數亦止此四十未嘗有天五地十之定位者正以天五與地十以五乗十而為此大衍之五十也何以明之五之妙用伍北坎之一以五而合六為西北之乾伍東震之三以五而合八為東北之艮者先其方之正後其維之偏伍西南坤之二以五而合七於西方之兊伍東南巽之四以五而合九於正南面之離者先其維之偏後其方之正故陽竒得五而為隂耦隂耦得五而為陽竒所以分隂分陽八卦以之成列至於十之用則什離南之九以相對而交十於坎北之一什兊西之七相對而交十於震東之三是陽数自交於陽而各立其方之正什艮東北之八以相對而交十於巽東南之四是隂數自交於隂而均就其維之偏因而各虚五於中則又皆十五之變所以剛柔相摩八卦相盪相錯變而通之推而行之者見天五地十獨専五十之用也故衍之於揲必以四以象四時五十之用正在於是其揲之以四者葢由五其一二三四於上而十其六七八九於下足以明之五與天一合而成六則四其六而二十有四為老隂坤之䇿五與地二合而成七則四其七而二十有八為少陽震坎艮之䇿五與天三合而成八則四其八而三十有二為少隂巽離兊之䇿五與地四合而成九則四其九而三十有六為老陽乾之䇿故少隂陽之七八不變合之而十五以為重卦之成畫老隂陽之九六所以變者合之而亦十五以為重卦之動爻易之變通配四時故四四而揲以象之其四營成易莫不由此河圖之實数四十虚天五之二五而以地十衍之而五十也夫四營成易四四而揲每爻之揲凡三每揲其蓍以合左右之竒或一二三而四或三一而四或二二而四其或左竒既先四則右竒後亦必四因二其四耦之成八以紀其數者竒必有耦也竒四而耦八亦見數之四十増八者河圖四十而成八卦也然其所揲之四未嘗五與九也今揲蓍者必謂初揲不五則九始由易疏謂第一變之竒不五則九第二揲第三揲之竒始皆不四則八原其第一揲誤以未揲之先所謂掛一之蓍同在數中以自亂其四而然也葢所揲之竒四之上加一則五八之上加一則九所以見也殊不識此一之加為五為九無成虧於所揲之四而徒為擾擾耳且夫掛一自當四營之一營在分而象兩之後揲之以四之先元未以之與於揲也若非以掛一之一誤於自亂則安得謂第二揲第三揲而不四則八也夫每更左右兩揲四始為一變𫝊謂十有八變而成卦則凡揲之變固不容有所異也安得每三揲之中第一揲為不五則九也如是則十有八變中獨六變若是之異若於中六變獨異則又安得總謂十有八變也哉此孔疏始為此誤而後之來者既不加察而𫝊信𫝊疑愈説愈紛卒未能有以正其誤者千載良一嘅也若謂掛一者合置於竒數中之用以為數則至於扐而後掛者又當何以哉載原其誤者葢泥於衍數五十其用四十有九謂掛一之一實在四十有九所用之中而不識夫掛一者所以揲每變四十有八之用而計其十有八變之數則乃所以為用也豈以夫一而自亂於四十有八所揲之衆哉故所揲之蓍實行其變者四十有八標夫掛一者以紀其變之十有八固所以為四十有九之用并與其始太極所不用之一通為大衍之五十也所以謂夫五十者蓍之徳貟而神者其貟以七七七而四十有九卦之徳方以知者其方以八八八而六十有四是以七合八之十五既合而見於蓍卦之數矣六爻之義易以貢者乃散而分見於乾之用九坤之用六以九合六之十五之用而由五以下七八九六無有不著於用者焉故以五乗十而所以謂為大衍五十也若是則由天之與地自一而至十五十有五之數莫不眞見其著落而大衍之五十與其用四十有九者亦莫不悉究其詣實其謂生生之易成象之乾效法之坤極數知來之占通變之事於此瞭然可盡至於隂陽不測之謂神神而明之存乎其人哉命蓍説卦曰昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻若是則蓍豈徒生数豈虚倚卦豈茍立而爻豈謾為哉因爻畫卦因卦兆數因數用蓍以極天下之􅄨以鼔天下之動由此其選也大𫝊曰蓍之徳貟而神卦之徳方以知六爻之義易以貢此大衍之数之蓍所由著也大衍之數葢五十其蓍而其用乃四十有九者葢已尊其一於不用以為太極之全體是所謂易有太極者也乃分其四十有九之蓍列左右為二以象兩是所謂太極生兩儀也兩儀者隂陽隂陽相儀匹而有老少則兩儀已含四象矣乃左取蓍而掛其一以象三八卦之畫以三而成則三才之道也葢以元五十不用之一與分兩之二兼之而成此三也是於分兩之二推其一以掛於兩之際所以象人極之立位乎兩間也是則參天兩地而倚數特寓於此不用之一象兩之二掛一之三參天也分而象兩固所以兩地者也於是觀變於隂陽而立卦矣所謂太極不用之一雖不以為用而乾陽之始一實兆乎此則其用未始不由此以出也因此乾用之一以分而為坤體之二則所謂象兩而為兩儀以兩儀而一隂一陽以老少於其位是兩儀已含四象矣是以繼之以象三之一而分隂分陽迭柔剛而用之而象三以畫則四象遂生八卦而八卦者已成列矣八卦各三位八卦而小成三極之道於是乎見矣合而言之是易有太極是生兩儀兩儀生四象四象生八卦已著於用而成於體矣然而大衍之數之用雖畧見於分兩掛之始而未大成也且太極不用之一象兩之二掛一之三雖等列而三位而其正用之蓍特不用之一與掛一之一其實數特二爾且以五十而始用其二則未用之蓍正存四十有八是用河圖之數四十以行八卦也且八卦各六位以八卦而其位各六而八之非四十有八者乎八卦雖八八而六十四而其為游魂歸魂者凡十有六不列於正八卦之六位故其數止於四十有八也由四十有八而上虛此十六卦為四四以揲之用乃所以成六十有四也於是乎觀變於隂陽而立卦則遂發揮於剛柔而生爻爻也者效天下之動者也立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦也前既以不用之一象兩之掛一之三等而三之由三而四故先以分左之蓍揲之以四以象四時四時而八節猶四象生八卦也故以四行八足以見十六卦之四四實用六十四卦之八八也四四之竒所以寄乾八八之竒所以寄坤八八之竒雖謂之耦然亦竒四所協以配故兼謂之歸竒也所揲之竒不一則二不三則四則歸之扐於是謂之歸竒於扐以象閏閏乃餘數之所歸故以竒象之竒亦餘也然後以分右之蓍四四而揲所揲之竒四且八之其得一則先左之竒必三合之而四得三則其先左之竒必一合之而四得二則其先左之竒亦必二通合之為四得四則其先左之竒亦必四特合之為八葢左先一而後右三與左先三而後右一固皆合四以為竒而其左先二而後右二雖亦合之為四而理乃倍四而耦八也若左竒既四右竒亦四因合而八以為耦耦雖謂八亦竒四之分配以成之也猶坤之􅄲乃乾􅅀之所分故統謂之竒乃随後右所合之竒所竒之蓍再扐于左而兼取左右所竒者掛之以待第二第三變是謂再扐而後掛也然而前掛一之掛則謂於四十有九中先取一蓍以獨掛此扐而後掛之掛則特謂掛其所竒之蓍也乃又總前已分二已掛一與所已過揲之蓍悉合之以還於大衍之初是之謂四營而成易而通為第一爻也所謂四營者分二者其一也掛一者其二也揲四其三也歸竒終營之四也其營既畢所竒既掛是為第一變之周也一變之後存其前所竒之外以所合前衍過揲之蓍如第一變之分二之掛一之揲四之歸竒再扐而後掛其所竒以合前變之竒以待第三變也其第三變則又如第一第二變之分二掛一揲四歸竒再扐而合此三變所竒之蓍以數之以四為少八為多三變皆少則所竒者十二則其過揲之所存總四九三十有六為乾之䇿三變皆多則所竒者二十四則其過揲之所存四六亦二十有四為坤之䇿兩多而一少則所竒者二十則其過揲之所存總四七二十有八是為震為坎為艮之䇿兩少而一多則所竒者十六則其過揲之所存總四八三十有二是為巽為離為兊之䇿凡如是三變竟始得為一爻之成畫亦必以所竒之䇿由初以終自下而上層積而紀之如畫卦之三爻然其竒之四為陽八為隂效八卦以取之兩多而一少者其先四中八後八為得陽之初象少陽七之震先八中四後八為得陽之中象少陽七之坎先八中八後四為得陽之上象少陽七之艮兩少而一多其先八中四後四為得隂之初象少隂八之巽先四中八後四為得隂之中象少隂八之離先四中四後八為得隂之上象少隂八之兊凡遇震坎艮則皆畫為一陽爻也遇巽離兊則皆畫為􅄲隂爻也􅅀􅄲者皆謂之少者象少者未遽變也獨其三變通得四四四者特謂為陽之純象老陽九之乾乃畫為今俗謂重為老陽九之爻其三變通得八八八者特謂為隂之純象老隂六之坤乃畫為十今俗謂交為老隂六之爻乾為老陽者本九竒而變含六耦之隂坤為老隂十者本六耦而變含九竒之陽乾坤之畫兼謂老者以老故變也其必三變始成一畫者寓隂陽變化擬議以定之也於三變所竒之䇿第其四與八之互者寓乾坤相索生六子意也凡如是而分而掛而揲且扐積其竒而合過揲之蓍者三謂之變始謂一爻之成又如是而三變則謂二爻之成又如是而三變乃通謂三爻之成是謂九變九變備三爻具始可當為卦之八者止三畫三其畫而八之則為八卦成列謂内卦謂下卦謂三微謂内貞是謂八卦而小成是三易所謂經卦皆八也葢必又如是以營以分以掛以揲以扐以計其所竒之積三而三之以為九變再成三畫以為外卦為上卦為三蓍為外悔合前九變之三畫是謂六畫而成卦是三易所謂其别皆六十有四始全其十有八變而成卦以備六位成章也其所以變必十有八者震坎艮各五畫得十五用乾之三為十八而二乾之一三五固十八也巽離兊各四畫得十二用坤之六為十八而三坤之二四亦十八也合兩十八則為乾之䇿四九三十六是前九變每爻四營積九變之營固三十六也倍之則龜之䇿七十二五行之土分王四時各十八日四其十八亦七十二日各九十日分土王之十八日亦各七十二故積十有八變每變四營通十八變計其營之數亦七十二五其七十二則三百有六十當期之日故有取於十八變七十二營以用四十有九蓍也葢前九變三畫分隂陽而列之不過八卦成列而象在中後九變三畫迭柔剛而用之乃因而重之而爻在中因其十八變而爻之迭柔剛也用此柔剛以相摩相盪相推相易而通其變引而伸之於六十四卦惟變所適是所謂變在其中由六十四卦觸類長之於三百八十四爻之外則天下之能事誠可畢矣蓍之徳可不謂貟而神於其常用卦之徳可不謂方以知於其常體而六爻之義可不謂易以貢於受命如響之變化者乎又可不謂寂然不動感而遂通天下之故者乎故以之通天下之志成天下之務定天下之業而㫁天下之疑其於幽贊於神明而生蓍參天兩地而倚数觀變於隂陽而立卦發揮於剛柔而生爻者蓍豈徒生數豈虛倚卦豈茍立而爻豈謾為哉果能此道以神明其徳誠可以顯道神徳行而酬酢祐神矣大衍之數五十其用四十有九其以是夫易筮通變卷下
