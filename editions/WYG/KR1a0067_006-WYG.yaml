body:
  text: 易筮通變卷上宋雷思齊撰卜筮洪範之稽疑曰擇建立卜筮人乃命卜筮詩曰爾卜爾筮體無咎言曰卜筮偕止㑹言近止記之月令則曰孟冬之月命大史釁龜筴占兆吉凶宜若龜筮相須為用也易大𫝊曰探􅄨索隠鈎深致逺成天下之亹亹者莫大乎蓍龜又曰以卜筮者尚其占則夫易宜兼卜筮之用者也大誥曰寧王遺我大寳龜紹天明即命金縢曰乃卜三龜一習吉於是莫見夫筮記又曰天子無筮諸侯有守筮天子道以筮於是又莫見夫卜而説卦則曰昔者聖人之作易幽賛於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻以至和順於道徳而理於義窮理盡性以至於命乃獨歸夫筮而未始及夫卜也由筮命蓍而蓍筮之用著於大衍之數實詳且備而龜之卜則莫之一語及也雖一間見謂龜為卜蓍為筮之説於别出而愚自童丱習見世之常占擲錢以畫卦爻云自京房始矣且賈公彦亦以畫卦之單拆重交之爻謂以錢復見有假於龜之刳中以布其錢者又雜於𫝊記謂卜得某卦之某卦之大凡且人有常言實稱卜卦故亦隨之等視筮龜卜筮為一槩未嘗以為意也葢嘗見周禮春官之屬大卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆其經兆之體皆百有二十其頌皆千有二百其下有卜師掌開龜兆龜人掌六龜以其方色與體辨之大卜又掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四其下有筮人掌三易之九筮以辨吉凶凡國之大事先筮而後卜上春相筮凡國事共筮然後知卜之用龜則以兆其書兆之體頌至百有二十千有二百之多而易之筮用蓍固未始出於六十四卦之外則卜自卜筮自筮未始相為用也况洪範固有龜従筮従龜従筮逆龜筮共違於人之别則其卜筮之分校然其辨白黑未始若後世説卜筮者樊然殽亂至若是之甚心甚異之由是於左傳之類究其成驗乃判然識卜筮之道卜者未嘗引易之筮筮者未嘗引龜之卜也今疏列為徴有専卜而不筮者晉惠公之在梁梁伯妻之梁嬴孕過期卜招父與其子卜之子曰将生一男一女招曰然男為人臣女為人妾名男曰圉女曰妾及圉西質于秦妾為宦女焉邾文公卜遷於繹史曰利於民而不利於君邾子曰茍利於民遷也天生民而樹之君以利之也民既利矣孤必與焉既遷而邾子卒齊侯戒師期将以伐魯而有疾醫曰不及秋將死魯文公聞之卜曰尚無及期叔仲恵伯令龜卜楚丘占之曰齊侯不及期非疾也君亦不聞令龜有咎既而齊懿公弑文公先薨恵伯亦卒楚王與葉公枚卜子良以為令尹沈尹朱曰吉過於其志葉公曰王子而相國過將何為他日改卜子國以為令尹若是者見卜之未嘗及於筮卦也有筮而不卜者畢萬筮仕於晉遇屯之比廖占之曰吉屯固比入吉孰大焉其必蕃昌震為主車従馬足居之兄長之母覆之衆歸之六體不易合而能固安而能殺公侯之卦也公侯之子孫必復其始秦伯伐晉卜徒父筮之曰吉涉河侯軍敗詰之對曰乃大吉也三敗必獲晉君其卦遇蠱其繇曰千乗三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也嵗云秋矣我落其實而取其材實落材亡不敗何待三敗及韓晉侯逆秦師戰於韓原秦獲晉侯以歸晉侯伐鄭楚子救鄭相遇於鄢陵公筮之史曰吉卦遇復曰南國䠞射其元王中厥目國䠞王傷不敗何待及戰吕錡射共王中目王曰天敗楚也吾不可待乃宵遁晉獻公筮嫁伯姬于秦遇歸妹之睽史蘇占之曰不吉其繇曰士刲羊亦無血也女承筐亦無貺也西鄰責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬車説其輹火焚其旗不利行師敗於宗丘歸妹之睽寇張之弧姪其従姑六年其逋逃歸其國而棄其家明年其死於髙梁之虛若是四者筮則有卦而無復卜兆辭也且前之屯復蠱三卦其繇固皆非易之辭後之歸妹之睽卦辭近周易而亦非也槩可想見連山歸藏之易其筮法同而繇辭異也有兼用卜筮而卜有辭筮有有辭者魯成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右間于兩社為公室輔季氏亡則魯不昌又筮之遇大有之乾曰同復於父敬如君所及生有文在其手曰友遂以命之若是者卜與筮各有筮辭之卦辭亦非周易辭也有先卜後筮者晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如従長且其繇曰専之渝攘公之羭一薫一猶十年尚猶有臭必不可弗聴立之生奚齊乃譖太子申生至於縊死遂立奚齊卒亂晉有先筮而後卜者衛侯夢於北宫見人登昆吾之觀被髮而譟曰登此昆吾之虚緜緜生之瓜余為渾良夫呌天無辜公親筮之胥彌赦占之曰不害衛侯貞卜繇曰如魚竀尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰冬十月晉復伐衞入其郛衛出莊公而與晉平晉立襄公之孫般師而還若是二者雖先卜後筮先筮後卜則殊筮無卦辭卜乃有繇然為卜為筮不比而同也其若晉獻公卜伐驪戎史蘇占之曰勝而不吉公曰何謂也對曰遇兆曰挾以銜骨齒牙為猾戎夏交捽是交勝也臣故云且懼有口攜民國私心焉公曰何口之有口在寡人寡人弗受誰其興之對曰茍可以攜其入也必甘受逞而不知胡可壅也公弗聴遂伐驪戎克之獲驪姬以歸卒以亂國若是者卜獨有繇辭而不及筮則國語猶然也辭與左𫝊尚未相逺也若家語謂孔子嘗自筮得賁卦愀然有不平之色子張進曰卜者得賁卦吉也而夫子之不平何也子曰以其離邪在周易山下有火賁非正色之卦也夫質也者黒白宜正焉今得賁非吾兆也吾聞丹漆不文白玉不雕何也質有餘不受飾也由今觀之是可疑者且既謂孔子自筮何子張乃謂之卜况其辭與易不類賁之彖曰賁柔來而文剛分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下何夫子於彖取其文於筮獨尚其質自相牴牾遽至於此愚故不敢以家語為信葢左氏於専筮而不卜列於専者尚多有之不克枚舉悉以周易之辭推之周易獨行至今人莫不審悉自家語一事之外卜之用龜兆筮之用蓍卦㫁斷乎未嘗自為紛糺也抑亦見連山歸藏之與周易而為三其經卦皆八其别皆六十有四者於體為不誣連山歸藏今莫之見例此遡求猶彷彿一二曷嘗如後之俗羣然同譌習稱蓍筮為卜卦哉説者謂易經由混於卜筮占兆得免秦火固亦或者然其謂太卜所掌經兆之體皆百二十其頌皆千二百乃無得見者豈所謂占兆可脱於火者亦不免邪昔漢文自代来卜得大横繇曰大横庚庚余為天王夏啟以光釋者謂大横龜之正横是其體也文帝有王之象則卜兆漢初似尚存而後世不𫝊唯北齊髙洋欲簒東魏卜於李密亦謂大横曰漢文之兆也愚意後特諂洋以成簒耳焉可盡信哉後世卜兆之書没没不聞多中何哉嗟乎合其體既三百六十分其頌乃三千六百之富宜乎其不存也誠使其存誰其及之哉何以明之連山歸藏世固罔然惟周易一書卦之少唯六十有四爻之多止於三百六十有四更三古四聖之所作述今未云至精至變至於至神之用至若經卦與其别者以辭而已雜然注釋者皆是也及問其蓍筮之惟變所適者則茫乎實莫知其為何事若是者尚欲與之語易不亦難矣哉愚因論卜筮之不可槩同嘗浩歎及之之卦聖人有以見天下之􅄨而擬諸形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繋辭焉以㫁其吉凶是故謂之爻極天下之􅄨者存乎卦鼔天下之動者存乎辭化而裁之存乎變推而行之存乎通然則變而通所以盡利通其變所以成文八卦成列而象在中因而重之而爻在中剛柔相推而變在中繋辭命之而動在中矣八卦以象告爻彖以情言變通以利言吉凶以情遷又曰爻象動乎内吉凶見乎外功業見乎變聖人之情見乎辭既曰鼓天下之動者存乎辭繫辭而命之動在其中則又曰繋辭焉以㫁其吉凶曰辨吉凶者存乎辭則辭也者易道之所必不得已也是故易之為書其道屢遷變動不居周流六虚上下无常剛柔相易不可為典要唯變所適卦有大小辭有險易辭也者各指其所之然則指其所之之之一字特指其變動之所之適也易變易也所以見天下之動而鼓天下之動者莫不於是乎觀故易之筮謂其爻變而動而有所之適者為某卦之某卦今之謂辭指所之者為之卦發也韓康伯於此指所之之下無注孔穎達疏曰各指所之謂爻卦之辭各斥其爻卦之之適也若之適於善則其辭善之適於惡則其辭惡而已夫以之之一字以訓適非不然也謂卦之變爻之動則未足以明其辭之所之也請亦以左𫝊明之陳敬仲之少也周史有以周易見陳侯陳侯使筮之遇觀之否乃觀之四爻之否之四爻也故史指觀之四爻之辭曰觀國之光利用賓于王因以知其代陳有國也晉文公之納王也筮之遇大有之睽乃大有之三之睽之三也故卜偃指大有之三爻曰吉公用享於天子之卦也戰克而王享吉孰大焉大有九三易以享為亨然亨本通音為享齊崔杼欲取棠公之嫠東郭姜筮之遇困之大過乃困之三之大過之三也史皆曰吉以示陳文子故文子指困之三爻曰夫従風風損妻不可取也且其繇曰困于石據于蒺藜入于其宫不見其妻凶且釋之曰困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也崔杼必取棠姜終以亂而家遂滅叔孫穆子之生荘叔以周易筮之遇明夷之謙乃明夷之初之謙之初也以示卜楚丘曰明而未融其當旦乎之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子攸行當三在旦故曰三日不食離為火火焚山敗於人為言言敗為讒故曰有攸徃主人有言言必讒也盖明夷初爻辭也其卒以豎牛之亂筮占無一不驗者衛㐮夫人無子嬖人婤姶生孟縶孔成子夢康叔謂已立元余使羈之孫圉與史茍相之史朝亦夢康叔謂已余命而子茍與孔烝鉏之曽孫圉相元史朝見成子而告之夢協韓宣子為正聘於諸侯之歳婤姶生子名之曰元孟縶之足不良能行成子以周易筮之曰元尚享衞國主其社稷遇屯之比又曰余尚立縶尚克嘉之遇屯以示史朝朝曰元亨又何極焉成子曰非長之謂也曰康叔命之可謂長矣是以繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲於夢武王所用也盖再遇屯卦辭皆曰元亨而屯變於初故之比之屯之初爻辭曰盤桓利居貞利建侯於是立元南蒯之将叛也枚筮之遇坤之比曰黄裳元吉以為大吉示子服恵伯曰即欲有事何如恵伯曰吾嘗學此矣忠信之事則可不然必敗黄中之色也裳下之飾也元善之長也中不中不得其色下不共不得其飾事不善不得其極非此三者不當且夫易不可以占險盖由坤之五之比之五也故釋以坤五之辭也南蒯卒以叛至於亡故嘗例乎是數者而夷考之𫝊葢尚多有之皆以所之之卦所動之爻言之夫之卦也者占變之事也易有聖人之道則謂以動者尚其變以筮者尚其占故通變之謂事極數知來之謂占占事則有之卦也抑古之學易者不惟占也君子所居而安者易之序也所樂而玩者爻之辭也居則觀其象而玩其辭動則觀其變而玩其占不惟占則有之卦也凡説諸心研諸慮事㑹所適言意所致引伸觸類亦未始不用之卦也楚子圍鄭克之晉師救鄭荀桓子聞鄭及楚平欲還曰無及於鄭而勦民焉用隨武子曰善彘季不可以中軍佐濟知荘子曰此師殆哉周易有之在師之臨曰師出以律否臧凶指師之初之臨之初也鄭游吉至自楚告子展曰楚子将死矣不脩政徳而貪昧於諸侯以逞其願欲久得乎在復之頥曰迷復凶其楚子之謂乎指復之上之頥之上也鄭公子曼滿與王子伯廖語欲為卿伯廖告人曰無徳而貪其在周易豐之離弗過之矣葢指豐之上之離之上也其辭曰豐其屋蔀其家闚其户闃其无人三嵗不覿凶也間一嵗鄭人果殺之若是三者尚不過槩舉其卦之一爻之所之之為然也至於蔡墨對魏獻子之問龍見絳郊則直曰周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰元龍有悔其坤曰見羣龍无首吉坤之剥曰龍戰于野此雖於象龍真龍之事有不容於理討然其所舉乾坤之爻凡六必皆互以乾坤反復相之之爻辭以相校而明其所之者謂全易之卦六十有四其爻三百八十有四變之所之率由是道也是足以遡明易大𫝊之辭也者各指其所之者非為他設也為之卦設也是固所以見天下之動而觀其㑹通以行其典禮㫁其吉凶化而裁之推而行之惟變所適也變之所適之卦之謂也故曰爻象動乎内吉凶見乎外功業見乎變聖人之情見乎辭卦有大小辭有險易辭也者各指其所之學者因之以是審於觀變以立卦倚數以生爻極深乎至精研幾乎至變以至於至神和順道徳而理於義窮理盡性以至於命胷中包有全易之體用斯其至矣易筮通變卷上
