body:
  text: 易圖通變卷一宋雷思齊撰河圖傳上則河圖以作易其數之所由起乎數之起不過一隂一陽之道而已易道之所以一隂一陽者不過以奇耦之數互為分且合以生且成而已陽竒隂耦變而通之繩繩兮雜而不亂者不過大傳所謂天一地二以至天五且地十而已易為太極極中也一也中自一也是生兩儀儀匹也二也匹而二也兩儀生四象一二三四分之以為四生數四象生八卦則六七八九合之以為四成數也四竒為陽陽雖有生成之異而各列於四方之正四耦為隂隂亦有生成之異而同均於四維之偏由正生偏由偏成正也一與三為竒為陽之生數而必待於六與八之隂數以為成二與四為耦為隂之生數亦必賴於七與九之陽數以為成也自北而東一而三乃陽生之進數而其自八而六東而北隂成之退數者固已寓乎其中自西而南二而四乃隂生之進數而其自九而七南而西陽成之退數者亦兼具乎其中矣四方者各以其陽竒居於正四維者各以其隂耦附於偏然天數之有五地數之有十均合於隂陽之竒耦而同謂之生成乃獨無所見于四方之位何也四象无五八卦无十故也然易之所以範圍不過曲成不遺者正由假此天五地十之虚數以行其實用于四象八卦而成河圖者特不當傚世習置五虚㸃于圖中心而附以十㸃謬云五十而不知其用也坎以一始於正北而一五為乾六於西北坤以二分于西南而二五為兊七於西震以三出於東而三五為艮八於東北巽以四附於東南而四五為離九于正南故陽得五而隂耦得五而竒隂得五而陽竒得五而耦是生數之所以成成數之所以生者也生數少于五无所待以制中也故陽數之一與三自為中於乾六艮八成數之隂之外隂衆而陽孤坎故謂䧟也成數多於五不能自適于中也故隂數之二與四取五於離九兊七成數之陽之内陽正而隂偏離故謂麗也䧟必止而求動故帝出乎震動所以取合由分而合也麗必順而相説故說言乎兊説所以致分由合而分也陽之進數坎獨為生數之始由北順行東交於巽四隂之進數坤亦為生數之次由西南逆行東合於震三是隂陽之生數三四俱前而合考於時今四月為乾月卦六陽之交坤月卦六隂之承故有巽无乾帝出震而齊乎巽也陽之退數離獨得成數之中由南順行西終於兊七隂之退數艮實始之由東北逆行既北而西究扵乾六是隂陽之成數六七俱後而分考於時今十月為坤月卦六隂之終乾月卦六陽載始故有乾而无巽説言乎兊戰乎乾也天數始於一則太極之全也陽之正也一析而二則太極之分也隂之偏也一二參而三則陽既唱而竒一三轉而四則隂遂隨而耦由一與四唱於前交對而為五而其二與三隨於後亦交對而為五是兩其五兩五相伍則十也參以天五是參伍也古文之五十古今文之十皆十是其象也變而通之生數之所以成成數之所以生也坎一巽四而五故乾六離九而十五也合之而二十坤二震三而五故兊七艮八而十五也合之亦二十是一二三四之十成六七八九之三十故河圖之數止於四十而虚用天五與地十而為天地之數五十有五也生數之二五而十雖分隂分陽而俱以生數之陽載成數之隂以維北若東而中由以立兩其十五而三十遂互隂互陽而又以成數之隂奉生數之陽以維南若西而中所以行也立者寄於虚以體其實行者布其實以用其虚也一二三四交羅四象而四互其虚五以為十而為生數之體六七八九并包八卦而四分其實五以為二十而為成數之用兩五之合十固已旁正而交為二十之分體二十之分五乃離合而統為天五之全用十交五體五周十用也坎一離九而十坤二艮八而十震三兊七而十巽四乾六而十皆一生一成也一必九三必七者四方四竒之十陽十也二必八四必六者四耦四維之十隂十也是四五本二十今則四十四伍而什皆所以分中於成數之實十四什而伍又所以合中於生數之虚五也是五伍而十十什而五參伍錯綜其數從横斜正倒之顛之无不十五者也伍之而十均十也一與九之十維坎維離坎一居隂北陽之始生隂中之陽隂極而生陽也陽之一初而獨立於中離九居陽南陽之終極陽中之陽陽極生隂麗於巽四坤二生數之隂隂不専立而當九陽之盛際陽羣合而制中者也說卦謂水火相逮而不相射者冬夏之至也冬至坎之自中夏至陽極而隂中也二與八之十維坤維艮三與七之十維震維兊陽自下而升由北東而極于南隂自上而降由南西而極于北此其交進交退以適于中者隂陽東西之所緯徃復啓閉之所塗否泰通塞之期而出震致坤說言成言而山澤通氣以為春秋之分所以曲而暢旁而通之也至於四與六之十維巽維乾此又隂陽之始終終始天地之窮變變通莫不由此制用何以眀之陽自乾坎而艮震自後而前以合於東南之巽隂自巽離而坤兊自前而後而分於西北之乾陽之生數一而三緫而四而巽兼之隂之生數二而四緫而六而乾兼之四而倍分之則八節與經卦所以序者類而長之也六而倍分之則六隂六陽十有二月與重卦之所以列者引而伸之也况乾之六雖二與四合而成然以一合五亦成也由五外交乎一而六五猶生數六已成數矣乃自有生成之道焉况合乎坎之一即中故乾特以老隂而變九也若巽特以一與三之生數而限之以四陽氣不足於數无以自達于中故借數於離九之中五乃始得中而與坎對中以四合五乃至於陽之極位極而必反是巽離兼數所以九為老陽而變六也是特以乾巽對十而九六之變為然至於乾巽之互為分合始終則有不止此震三巽四合而雷風相薄見於恒卦巽當四月則已如前說若兊七乾六分而西北乾當十月則又未易以乾巽對十為說而止者乾陽也數乃隂六而位於坎前兊隂也數乃陽七而位於坤後故於乾兊六七之中各借五為之乘除而變乾之六而於參伍之前有一乾在坎前是乾之一出而為坎之一兊之七而於參伍之後有二兊在坤後是坤之二入為兊之二也乾兊雖以成數之六七互分而坎坤乃以生數之一二互起於中矣然而兊不名二而坤名二坎名一而乾不名一乾之所以不自名其一者葢以寓其不入於數而并包八卦之五與十生成之用而為太極之全也此以數言則天一地二天地設位以氣言則分隂分陽隂陽相薄而易所以行乎其中者始由於是則陽生之進數所以為隂成之退數隂生之進數所以為陽成之退數乃互進互退迭生迭成此其生生之易一隂一陽之道无所終窮也豈不至精至變而至神者與又况易以一其三畫因得析而生八卦二其三畫遂得錯而成八八之卦若其卦之成畫則止於六矣乃復於乾獨三其三以至謂之九何也凡卦畫如圖以五為中必有九而後中乃在五既中五之後六為上爻者葢其卦氣之餘也生數既終成數攸始此九六虚實之所以寄也坤起於成數之六而實乾極於成數之九而虚六乃坤數成始附於圖位則以寄其乾九九乃乾數成終附於卦位則以同於坤六其六居退數之極而進居乎坎中之前九居進數之極而退附乎離麗之後故六於卦猶有位九於卦已無位而并寄位於六而迭為九六者九虚六實因兼著其體用也且乾老陽也坤老隂也父母之謂也少隂少陽則六子男女之謂也少隂少陽之數則七八也乾元用九坤元用六合六十四卦无有七八而唯有九六是男女者亦由父母之所變而隨以變者也凡物之産莫不由於母而莫名其父之徳之在故坤猶見於六畫之體而乾之九有其九用而莫究其體之由是所以神無方而易无體者也天一兼天五而六地二合地四而六五與六當十數生成互中之地納甲以戊己為中納戊以中乎坎納己以中乎離戊己即五六也置於坎離之中所以見其互中也六合二四為地數之成始見於卦之坤曰龍戰于野即戰乎乾疑於陽而嫌於无陽見隂之有待於陽也故其道窮而坤之用六不過曰利永貞天數之一五九是所謂始中終九為天數之成終見於卦之乾曰亢龍有悔盈不可久而不可為首而乾之用九則天下治而見天則是見其行健无所待於隂也一與九合為乾則其數十而十乃寄於天九之外无所致其用矣地道无成而代有終又有在於是是槩論九六之大凡可以意討也河圖之列祗為經卦設今而并及於重卦之體用也經卦重卦无徃而不一隂一陽由竒耦之分合以生始成終者也一二三四而五同為生數一至四其實體五其虚用也六七八九而十同為成數六至九其實體十其虚用也四象无五八卦无十坦然明白矣四方各具十數緫而四十四隅各包五數共為二十二十則四其五而虚用者各居其半四十者八其五而實體者兼㑹其全故四象合八卦而緫之則四十也五為立中之體而生十為行中之用而成也且五分於成數六七八九之内皆隂數少而陽數多隂固偏陽固正五不得中而寄於四隅之偏十合於生數一二三四之外皆陽數少而隂數多隂亦偏而陽亦正十各成中而居四方之正然則正則中中則正也五始既所以正位於虚用之中十中又所以中立於實用之外皆所以為一隂一陽之中道也由隂陽中既復有隂陽此體用中所以復有體用虚實實虚始終終始變化生成相與為无所終窮者也又况五其五而二十有五亦天數也六其五五其六三其十十其三而三十亦地數也一且九二且八三且七而四且六之各十與本數虚用之十以之伍其什什其伍斯則大衍之數五十矣而其兆始之一寄中之五藏其用於无形之天則又出乎五十十五之外大衍所不得而用也又惡知不用之用乃所以用大衍者以是見一隂一陽之謂道參伍而錯綜之凡天地之數五十有五所以成變化而行鬼神有以見天下之賾見天下之動而知神之所為者斯羲皇所以則河圖而作易者也孔子賛易謂其至精至變以至於至神吁斯其至神者矣易圖通變卷一
